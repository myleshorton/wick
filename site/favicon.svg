<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wick flame favicon — matches site's ember aesthetic -->
  <defs>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#C45A1A"/>
      <stop offset="40%" stop-color="#E8913A"/>
      <stop offset="80%" stop-color="#FFD666"/>
      <stop offset="100%" stop-color="#FFF5CC"/>
    </linearGradient>
    <linearGradient id="inner" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#E8913A"/>
      <stop offset="60%" stop-color="#FFD666"/>
      <stop offset="100%" stop-color="#FFFBE6"/>
    </linearGradient>
  </defs>
  <!-- Outer flame -->
  <path d="M32 4 C32 4, 14 28, 14 40 C14 50, 22 58, 32 58 C42 58, 50 50, 50 40 C50 28, 32 4, 32 4Z" fill="url(#flame)"/>
  <!-- Inner flame (brighter core) -->
  <path d="M32 20 C32 20, 22 34, 22 42 C22 48, 26 52, 32 52 C38 52, 42 48, 42 42 C42 34, 32 20, 32 20Z" fill="url(#inner)"/>
  <!-- Wick -->
  <rect x="30" y="52" width="4" height="10" rx="1" fill="#3D2B1F"/>
</svg>
